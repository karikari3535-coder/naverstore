<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>셀러랩스 | 상품명 추천기 (독립 데모)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    /* 셀러랩스 공식 디자인 토큰 (sellerlabs.co.kr) */
    --bg:#FDF6F0; --card:#FFF; --ink:#1A1430; --gray:#60697B; --line:#ECE8F5; --soft:#F8F6FD;
    --primary:#6100FF; --primary-dark:#5000D9; --primary-soft:#F3EDFF;
    --green:#1FA37A; --yellow:#E8A33D; --red:#FF4D4F;
    --accent:#FFBE00;
    --radius:8px; --radius-lg:16px; --shadow:0 0 16px rgba(30,34,40,.06);
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    letter-spacing:-.24px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);line-height:1.4;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .btn{display:inline-flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;border:none;height:52px;padding:0 28px;
    border-radius:8px;font-size:16px;font-weight:700;letter-spacing:-.24px;cursor:pointer;transition:.18s;white-space:nowrap;
    box-shadow:0 6px 18px rgba(97,0,255,.20);text-decoration:none}
  .btn:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 8px 22px rgba(97,0,255,.26)}
  .btn:disabled{opacity:.6;cursor:default;transform:none}
  .pill{display:inline-block;background:var(--primary-soft);color:var(--primary-dark);padding:6px 13px;
    border-radius:8px;font-size:13px;font-weight:600;margin:3px}
  .pill-green{display:inline-block;background:#E9F7F1;color:#147A57;padding:6px 13px;
    border-radius:8px;font-size:13px;font-weight:600;margin:3px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-left:6px;vertical-align:middle}
  .badge-live{background:#E9F7F1;color:#147A57}
  .badge-demo{background:var(--primary-soft);color:var(--primary-dark)}
  .loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px;color:var(--gray);font-weight:600}
  .spinner{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-box{padding:16px 18px;background:#FDECEA;border:1px solid #F5C6C0;border-radius:12px;color:#B03A2E;font-size:14px;font-weight:600;margin-top:20px}

  nav{position:sticky;top:0;z-index:50;background:rgba(253,246,240,.82);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .logo svg{height:24px;width:auto;display:block}
  .logo .sub{font-size:13px;font-weight:700;color:var(--gray);letter-spacing:-.24px;padding-left:10px;margin-left:2px;border-left:1px solid var(--line)}
  nav .btn{padding:0 22px;height:44px;font-size:14px;border-radius:8px}

  .hero{padding:72px 0 48px;text-align:center}
  .hero .eyebrow{display:inline-block;color:var(--primary-dark);background:var(--primary-soft);font-weight:700;font-size:14px;letter-spacing:-.24px;margin-bottom:18px;padding:7px 16px;border-radius:999px}
  .hero h1{font-size:clamp(28px,5vw,46px);font-weight:700;letter-spacing:-.48px;line-height:1.4}
  .hero h1 .hl{background:linear-gradient(transparent 58%,#D7C8FF 58%);padding:0 4px}
  .hero p.lead{font-size:18px;color:var(--gray);margin:22px auto 0;max-width:600px}

  .tool{margin:40px auto 0;max-width:760px;background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--line);padding:32px;text-align:left}
  .modes{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .mode-btn{flex:1;min-width:118px;padding:12px;border:1.5px solid var(--line);background:#fff;
    border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;color:var(--gray);transition:.2s}
  .mode-btn.active{border-color:var(--primary);color:var(--primary);background:#F3EDFF}
  label{display:block;font-weight:700;font-size:14px;margin-bottom:8px}
  .input-row{display:flex;gap:10px}
  .input-row input{flex:1;padding:16px 18px;border:1px solid var(--line);border-radius:8px;
    font-size:16px;outline:none;transition:.2s;background:#fff;box-shadow:0 0 16px rgba(30,34,40,.04)}
  .input-row input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(97,0,255,.12)}
  .extra{margin-top:14px;display:none;grid-template-columns:1fr 1fr;gap:10px}
  .extra.show{display:grid}
  .extra input{padding:13px 16px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;background:#fff}
  .current-box{margin-top:14px;display:none}.current-box.show{display:block}
  .current-box input{width:100%;padding:13px 16px;border:1.5px dashed var(--line);border-radius:8px;font-size:14px;outline:none;background:var(--soft)}

  .result{margin-top:26px;display:none;animation:fade .45s ease}.result.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;margin-bottom:20px}
  .vs-col{border-radius:16px;padding:18px}
  .vs-old{background:#F4F2FA;border:1px solid var(--line)}
  .vs-new{background:linear-gradient(135deg,#F3EDFF,#FBF9FF);border:1.5px solid var(--primary)}
  .vs-col .tag{font-size:12px;font-weight:700;margin-bottom:8px}
  .vs-old .tag{color:var(--gray)}.vs-new .tag{color:var(--primary-dark)}
  .vs-col .txt{font-size:17px;font-weight:800;letter-spacing:-.4px;line-height:1.4}
  .vs-old .txt{color:#9A8F84}
  .vs-arrow{display:flex;align-items:center;font-size:24px;color:var(--primary)}
  .vs-delta{font-size:12px;margin-top:10px;font-weight:700}.vs-up{color:var(--green)}
  .copy-btn{margin-top:12px;background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
  .copy-btn:hover{background:var(--primary-dark)}

  .track-btn{width:100%;margin:18px 0;padding:16px;border:none;border-radius:8px;background:var(--primary);
    color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;display:flex;flex-direction:column;
    align-items:center;gap:4px;box-shadow:0 8px 22px rgba(255,107,74,.30)}
  .track-btn:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-2px)}
  .track-btn:disabled{cursor:default}
  .track-btn.done{background:var(--green);box-shadow:none}
  .track-hint{font-size:11px;font-weight:500;opacity:.8}

  .gauge-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:18px}
  .gauge-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .verdict{font-size:18px;font-weight:800}.gauge-score{font-size:13px;color:var(--gray)}
  .gauge-track{height:12px;border-radius:99px;position:relative;background:linear-gradient(90deg,#1FA37A,#E8A33D,#E5604D)}
  .gauge-needle{position:absolute;top:-5px;width:4px;height:22px;background:var(--ink);border-radius:2px;transform:translateX(-50%);transition:left .8s cubic-bezier(.2,.8,.2,1)}
  .gauge-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-top:8px}
  .gauge-desc{font-size:13.5px;color:#5C534B;margin-top:14px;padding:12px 14px;background:var(--soft);border-radius:10px}
  .opp-kw{margin-top:14px}.opp-label{font-size:12px;color:var(--gray);font-weight:700;margin-right:4px}

  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .meta-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .meta-h4{font-size:13px;color:var(--gray);margin-bottom:12px;font-weight:700}
  .kw-bar{margin-bottom:10px}
  .kw-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .kw-track{height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  .kw-fill{height:100%;background:linear-gradient(90deg,var(--primary),#A47CFF);border-radius:99px}
  .total-vol{font-size:13px;color:var(--gray);margin-top:8px}.total-vol b{color:var(--primary);font-size:18px}
  .reason{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px}
  .reason ol{padding-left:18px;font-size:13.5px;color:#4A4240}.reason li{margin-bottom:5px}

  .tracked-panel{margin-top:20px;padding:20px;background:var(--soft);border:1px solid var(--line);border-radius:16px}
  .tracked-row{display:flex;justify-content:space-between;align-items:center;padding:14px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-top:10px}
  .tracked-name{font-weight:700;font-size:15px;letter-spacing:-.3px}
  .tracked-meta{font-size:12px;color:var(--gray);margin-top:4px}
  .tracked-del{background:none;border:1px solid var(--line);color:var(--gray);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
  .tracked-del:hover{border-color:var(--red);color:var(--red)}

  /* 검색량 요약 카드 */
  .vol-summary{margin-top:20px;background:linear-gradient(135deg,#F1EAFF,#FAF7FF);border:1px solid #D9C9FF;border-radius:14px;padding:18px 20px}
  .vol-main{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .vol-label{font-size:14px;font-weight:600;color:var(--gray)}
  .vol-num{font-size:30px;font-weight:800;color:var(--primary);line-height:1}
  .vol-num small{font-size:15px;font-weight:600;margin-left:2px}
  .comp-badge{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--gray)}
  .vol-split{display:flex;gap:20px;margin-top:10px;font-size:13px;color:var(--gray)}
  .vol-split b{color:var(--ink)}
  /* 길이 분포 */
  .len-box{margin-top:20px}
  .len-bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin:10px 0 6px;overflow-x:auto}
  .len-col{flex:1;min-width:38px;display:flex;flex-direction:column;align-items:center;height:100%}
  .len-bar-track{flex:1;width:100%;display:flex;align-items:flex-end}
  .len-bar{width:100%;background:#E2D6FA;border-radius:6px 6px 0 0;transition:height .4s}
  .len-bar.len-hot{background:var(--primary)}
  .len-cnt{font-size:12px;font-weight:700;color:var(--ink);margin-top:4px}
  .len-w{font-size:11px;color:var(--gray)}
  .len-note{font-size:13px;color:var(--gray);margin-top:8px}
  .len-note b{color:var(--primary)}
  /* 주요정보 */
  .keyinfo-box{margin-top:20px}
  .ki-group{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--line)}
  .ki-group:last-child{border-bottom:none}
  .ki-label{flex:0 0 70px;font-size:13px;font-weight:700;color:var(--primary);padding-top:4px}
  .ki-pills{display:flex;flex-wrap:wrap;gap:6px}
  .ki-pill em{font-style:normal;margin-left:5px;font-size:11px;color:var(--gray);font-weight:600}

  @media(max-width:760px){.meta-grid,.vs{grid-template-columns:1fr}.vs-arrow{transform:rotate(90deg);justify-content:center}}
</style>
</head>

<script>

/* ===================== 추천 엔진 ===================== */
const normalize=a=>{if(!a.length)return[];const lo=Math.min(...a),hi=Math.max(...a);return hi===lo?a.map(()=>1):a.map(v=>(v-lo)/(hi-lo));};
function scoreKeywords(k){const nf=normalize(k.map(x=>x.freq)),nv=normalize(k.map(x=>x.volume));return k.map((x,i)=>({...x,score:nf[i]*0.6+nv[i]*0.4})).sort((a,b)=>b.score-a.score);}
function buildName(main,kws,ex={},maxW=7,maxL=50){
  const r=scoreKeywords(kws),out=[],used=new Set();
  if(ex.brand){out.push(ex.brand);used.add(ex.brand);}
  main.split(" ").forEach(t=>{if(t&&!used.has(t)){out.push(t);used.add(t);}});
  for(const k of r){if(out.length>=maxW)break;if(used.has(k.word))continue;
    if([...used].some(u=>u.includes(k.word)||k.word.includes(u)))continue;
    if([...out,k.word].join(" ").length>maxL)continue;out.push(k.word);used.add(k.word);}
  if(ex.volume&&[...out,ex.volume].join(" ").length<=maxL)out.push(ex.volume);
  return out.join(" ");
}
function calcDifficulty(c){
  const reviewN=Math.min(c.avgReview/50,1);
  const comp=(c.bundleRatio*0.4)+(reviewN*0.4)+0.2;
  const raw=comp*100*(1-Math.min(c.searchVolume/20000,0.6));
  return Math.round(Math.min(Math.max(raw,5),95));
}
function verdictOf(s){
  if(s<35)return{label:"지금 들어가세요! 🟢",color:"var(--green)",desc:"상위노출 경쟁이 낮은 키워드예요. 상품명 최적화만 잘해도 광고 없이 순위가 올라갑니다."};
  if(s<65)return{label:"해볼 만해요 🟡",color:"var(--yellow)",desc:"경쟁이 보통 수준이에요. 상품명 + 리뷰 관리를 병행하면 충분히 상위권 진입이 가능합니다."};
  return{label:"경쟁이 셉니다 🔴",color:"var(--red)",desc:"이미 강한 셀러들이 자리잡은 키워드예요. 아래 기회 키워드로 우회하는 걸 추천드려요."};
}

function getTracked(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch{return[];}}
function isTracked(name){return getTracked().some(i=>i.productName===name);}
async function registerTracking(item){
  // TODO: 셀러랩스 순위추적 API 연결
  await new Promise(r=>setTimeout(r,600));
  const saved={...item,id:"local_"+Date.now(),createdAt:new Date().toISOString()};
  const list=getTracked();list.unshift(saved);
  localStorage.setItem(STORE_KEY,JSON.stringify(list));
  return saved;
}
function removeTracking(id){localStorage.setItem(STORE_KEY,JSON.stringify(getTracked().filter(i=>i.id!==id)));}

/* ===================== 실데이터 모드 ===================== */
let LIVE=false; // 서버에 네이버 키가 있으면 true
async function detectMode(){
  try{
    const r=await fetch('/api/status');
    if(r.ok){const j=await r.json();LIVE=!!j.liveData;}
  }catch{LIVE=false;}
  const badge=document.getElementById('modeBadge');
  if(badge){
    badge.className='badge '+(LIVE?'badge-live':'badge-demo');
    badge.textContent=LIVE?'🟢 실데이터 (네이버 쇼핑)':'🟡 데모 데이터';
  }
}

/* 더미 DEMO_DB → 공통 렌더 데이터 형태로 변환 */
function fromDemo(kw){
  const db=DEMO_DB[kw.replace(/\s/g,'')]||DEMO_DB[kw]||DEMO_DB["대저토마토"];
  return {
    keywords:db.keywords.map(k=>({word:k.word,freq:k.freq,volume:k.volume})),
    category:db.category,
    difficulty:calcDifficulty(db.competition),
    extraTags:db.extraTags,
    oppKeywords:db.oppKeywords,
    hasVolume:true,
    live:false
  };
}

/* 실서버 /api/analyze → 공통 렌더 데이터 형태로 변환 */
async function fromApi(kw,ex){
  const q=new URLSearchParams({kw});
  if(ex.brand)q.set('brand',ex.brand);
  if(ex.volume)q.set('volume',ex.volume);
  const r=await fetch('/api/analyze?'+q.toString());
  const j=await r.json();
  if(!r.ok)throw new Error(j.detail||j.error||('HTTP '+r.status));
  return {
    keywords:j.keywords.map(k=>({word:k.word,freq:k.freq,volume:k.volume||0})),
    category:j.category||'(카테고리 정보 없음)',
    difficulty:j.difficulty,
    extraTags:j.tags||[],
    oppKeywords:[],
    sampleTitles:j.sampleTitles||[],
    totalProducts:j.totalProducts,
    serverName:j.recommendedName,
    hasVolume:!!j.hasSearchVolume,           // 검색광고 API 연동 여부
    mainSearchVolume:j.mainSearchVolume,     // 메인 키워드 월간 검색량
    mainSearchVolumePc:j.mainSearchVolumePc,
    mainSearchVolumeMobile:j.mainSearchVolumeMobile,
    mainCompIdx:j.mainCompIdx,
    totalExposureVolume:j.totalExposureVolume,
    lengthDistribution:j.lengthDistribution||[],
    avgWords:j.avgWords,
    avgChars:j.avgChars,
    recommendedRange:j.recommendedRange,
    keyInfo:j.keyInfo||[],
    reasons:j.reasons||[],
    live:true
  };
}

/* ===================== UI 제어 ===================== */
let mode="quick";
document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>{
  mode=b.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('extra').classList.toggle('show',mode==='complete');
  document.getElementById('currentBox').classList.toggle('show',mode==='complete');
});
document.getElementById('genBtn').onclick=generate;
document.getElementById('kwInput').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});

async function generate(){
  const kw=document.getElementById('kwInput').value.trim();
  if(!kw)return;
  const ex={brand:document.getElementById('brand').value.trim(),volume:document.getElementById('volume').value.trim()};
  const res=document.getElementById('result');
  const genBtn=document.getElementById('genBtn');

  // 데이터 획득 (실데이터 우선, 실패 시 더미 fallback)
  let data;
  if(LIVE){
    res.classList.add('show');
    res.innerHTML='<div class="loading"><span class="spinner"></span>네이버 쇼핑 상위 40개 분석 중…</div>';
    genBtn.disabled=true;
    try{
      data=await fromApi(kw,ex);
    }catch(e){
      // 실패하면 데모로 폴백하되 안내
      data=fromDemo(kw);
      data._fallbackMsg='실데이터 조회 실패('+e.message+') → 데모 데이터로 표시합니다.';
    }
    genBtn.disabled=false;
  }else{
    data=fromDemo(kw);
  }

  render(kw,ex,data);
}

function render(kw,ex,db){
  const name=db.serverName||buildName(kw,JSON.parse(JSON.stringify(db.keywords)),ex);
  const used=name.split(" ");
  let bars=db.keywords.filter(k=>used.includes(k.word));
  // 메인 키워드 자체 검색량도 막대/합계에 포함 (레퍼런스와 동일)
  if(db.hasVolume&&db.mainSearchVolume!=null&&!bars.some(b=>b.word===kw)){
    bars=[{word:kw,freq:0,volume:db.mainSearchVolume},...bars];
  }
  const maxV=Math.max(...bars.map(b=>b.volume||b.freq),1);
  // 서버가 계산한 총 노출 검색량(메인 키워드 포함) 우선 사용
  const total=db.hasVolume
    ?(db.totalExposureVolume!=null?db.totalExposureVolume:bars.reduce((s,b)=>s+(b.volume||0),0))
    :0;
  const diff=db.difficulty;
  const v=verdictOf(diff);
  const cur=document.getElementById('currentName').value.trim();
  let html="";
  if(db._fallbackMsg)html+=`<div class="err-box">⚠️ ${esc(db._fallbackMsg)}</div>`;

  if(mode==='complete'&&cur){
    const curUsed=cur.split(/\s+/);
    const curMatch=db.keywords.filter(k=>curUsed.includes(k.word)).length;
    const deltaTxt=db.hasVolume
      ? `▲ ${(total-Math.round(total*0.35)).toLocaleString()}회 상승 (${total.toLocaleString()}회)`
      : `▲ 상위노출 키워드 ${bars.length}개 반영 (현재 ${curMatch}개)`;
    const oldTxt=db.hasVolume
      ? `추정 노출 검색량 ${Math.round(total*0.35).toLocaleString()}회`
      : `상위노출 키워드 ${curMatch}개 포함`;
    html+=`<div class="vs">
      <div class="vs-col vs-old"><div class="tag">현재 상품명</div><div class="txt">${esc(cur)}</div>
        <div class="vs-delta">${oldTxt}</div></div>
      <div class="vs-arrow">→</div>
      <div class="vs-col vs-new"><div class="tag">추천 상품명</div><div class="txt">${esc(name)}</div>
        <div class="vs-delta vs-up">${deltaTxt}</div>
        <button class="copy-btn" data-copy="${esc(name)}">복사하기</button></div></div>`;
  }else{
    html+=`<div class="vs-col vs-new" style="margin-bottom:20px"><div class="tag">추천 상품명</div>
      <div class="txt">${esc(name)}</div>
      <button class="copy-btn" data-copy="${esc(name)}">복사하기</button></div>`;
  }

  const already=isTracked(name);
  html+=`<button class="track-btn ${already?'done':''}" id="trackBtn" ${already?'disabled':''}>
    <span id="trackLabel">${already?'✓ 이미 추적 중':'📌 이 상품명으로 순위추적 등록하기'}</span>
    <span class="track-hint">* 로컬 저장 (셀러랩스 순위추적 미연동)</span></button>`;

  if(mode==='competition'||mode==='complete'){
    html+=`<div class="gauge-box"><h4 class="meta-h4">📊 진입 난이도</h4>
      <div class="gauge-head"><span class="verdict" style="color:${v.color}">${v.label}</span>
        <span class="gauge-score">난이도 ${diff}/100</span></div>
      <div class="gauge-track"><div class="gauge-needle" id="needle" style="left:0%"></div></div>
      <div class="gauge-labels"><span>쉬움</span><span>보통</span><span>어려움</span></div>
      <div class="gauge-desc">${v.desc}</div>
      ${diff>=65?`<div class="opp-kw"><span class="opp-label">💡 기회 키워드 →</span>${db.oppKeywords.map(k=>`<span class="pill-green">${esc(k)}</span>`).join('')}</div>`:''}
    </div>`;
  }

  const barTitle=db.hasVolume?'📈 키워드별 검색량':'📈 상위 40개 등장 빈도';
  const totalLine=db.hasVolume
    ? `총 노출 검색량 <b>${total.toLocaleString()}회</b>`
    : (db.totalProducts!=null?`네이버 쇼핑 전체 상품 <b>${db.totalProducts.toLocaleString()}개</b>`:'');
  html+=`<div class="meta-grid">
    <div class="meta-box"><h4 class="meta-h4">${barTitle}</h4>
      ${bars.map(b=>{const val=db.hasVolume?b.volume:b.freq;const unit=db.hasVolume?'회':'개 상품';
        return `<div class="kw-bar"><div class="kw-top"><span>${esc(b.word)}</span><b>${val.toLocaleString()}${unit}</b></div>
        <div class="kw-track"><div class="kw-fill" style="width:${val/maxV*100}%"></div></div></div>`;}).join('')}
      <div class="total-vol">${totalLine}</div></div>
    <div class="meta-box"><h4 class="meta-h4">🗂 추천 카테고리</h4><span class="pill">${esc(db.category)}</span>
      <h4 class="meta-h4" style="margin-top:16px">🏷 추천 태그</h4>
      ${[...db.extraTags,...db.keywords.filter(k=>!used.includes(k.word)).map(k=>k.word)].slice(0,10).map(t=>`<span class="pill">${esc(t)}</span>`).join('')}</div>
  </div>`;

  // 메인 키워드 월간 검색량 요약 카드
  if(db.hasVolume&&db.mainSearchVolume!=null){
    const comp=db.mainCompIdx?`<span class="comp-badge">경쟁 ${esc(db.mainCompIdx)}</span>`:'';
    html+=`<div class="vol-summary">
      <div class="vol-main"><span class="vol-label">"${esc(kw)}" 월간 검색량</span>
        <span class="vol-num">${db.mainSearchVolume.toLocaleString()}<small>회</small></span>${comp}</div>
      <div class="vol-split">
        <span>📱 모바일 <b>${(db.mainSearchVolumeMobile||0).toLocaleString()}</b></span>
        <span>💻 PC <b>${(db.mainSearchVolumePc||0).toLocaleString()}</b></span>
      </div></div>`;
  }

  // 상품명 길이 분포
  if(db.lengthDistribution&&db.lengthDistribution.length){
    const maxC=Math.max(...db.lengthDistribution.map(d=>d.count),1);
    const rr=db.recommendedRange||[];
    html+=`<div class="meta-box len-box"><h4 class="meta-h4">📏 상위 상품명 길이 분포</h4>
      <div class="len-bars">
        ${db.lengthDistribution.map(d=>{
          const inRange=rr.length&&d.words>=rr[0]&&d.words<=rr[1];
          return `<div class="len-col"><div class="len-bar-track">
            <div class="len-bar ${inRange?'len-hot':''}" style="height:${Math.max(d.count/maxC*100,8)}%"></div></div>
            <div class="len-cnt">${d.count}</div><div class="len-w">${d.words}단어</div></div>`;
        }).join('')}
      </div>
      <div class="len-note">평균 <b>${db.avgWords??'-'}</b>단어 · <b>${db.avgChars??'-'}</b>자 ·
        상위 셀러 권장 <b>${rr.length?rr[0]+'~'+rr[1]:'-'}</b>단어</div></div>`;
  }

  // 상품 주요정보 (형태/특징/사용부위 등)
  if(db.keyInfo&&db.keyInfo.length){
    html+=`<div class="meta-box keyinfo-box"><h4 class="meta-h4">🧩 상품 주요정보 (상위 40개 분석)</h4>
      ${db.keyInfo.map(g=>`<div class="ki-group"><span class="ki-label">${esc(g.group)}</span>
        <div class="ki-pills">${g.items.map(it=>`<span class="pill ki-pill">${esc(it.word)}<em>${it.count}</em></span>`).join('')}</div>
      </div>`).join('')}</div>`;
  }

  if(db.live&&db.sampleTitles&&db.sampleTitles.length){
    html+=`<div class="reason"><h4 class="meta-h4">🔎 분석한 상위 상품명 (샘플)</h4><ol>
      ${db.sampleTitles.map(t=>`<li>${esc(t)}</li>`).join('')}</ol></div>`;
  }

  // 최적화 이유 — 서버 생성(레퍼런스 패턴) 우선, 없으면 데모용 기본 문구
  let reasons=(db.reasons&&db.reasons.length)?db.reasons:(db.hasVolume
    ? [`필수 키워드 "${kw}" 포함`,`상위노출 빈도 1위 키워드 우선 배치`,`검색량 최상위 키워드 결합으로 노출 확대`,
       `동일 단어 비연속 배치로 SEO 패널티 회피`,`${used.length}개 단어 사용 (네이버 권장 7~9개)`,`특수문자 0개 · 50자 이내 준수`]
    : [`필수 키워드 "${kw}" 포함`,`네이버 쇼핑 상위 40개에서 가장 자주 쓰인 키워드 우선 배치`,
       `상위 셀러들이 공통으로 쓰는 세부 키워드 결합`,`동일 단어 비연속 배치로 SEO 패널티 회피`,
       `${used.length}개 단어 사용 (네이버 권장 7~9개)`,`특수문자 0개 · 50자 이내 준수`]);
  html+=`<div class="reason reason-opt"><h4 class="meta-h4">💡 최적화 이유</h4><ol>
    ${reasons.map(r=>`<li>${esc(r)}</li>`).join('')}</ol></div>`;

  const res=document.getElementById('result');
  res.innerHTML=html;res.classList.add('show');

  res.querySelectorAll('.copy-btn').forEach(btn=>btn.onclick=()=>{
    navigator.clipboard.writeText(btn.dataset.copy);
    const o=btn.textContent;btn.textContent='복사됨 ✓';setTimeout(()=>btn.textContent=o,1500);
  });
  const tBtn=document.getElementById('trackBtn');
  tBtn.onclick=async()=>{
    if(tBtn.disabled)return;
    tBtn.disabled=true;document.getElementById('trackLabel').textContent='등록 중…';
    await registerTracking({productName:name,mainKeyword:kw,category:db.category,totalVolume:total,difficulty:diff});
    tBtn.classList.add('done');document.getElementById('trackLabel').textContent='✓ 등록 완료!';
    setTimeout(()=>{document.getElementById('trackLabel').textContent='✓ 이미 추적 중';},1800);
    renderTracked();
  };

  const needle=document.getElementById('needle');
  if(needle)setTimeout(()=>needle.style.left=diff+'%',50);

  renderTracked();
  res.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderTracked(){
  const items=getTracked();const box=document.getElementById('trackedListBox');
  if(!items.length){box.innerHTML="";return;}
  box.innerHTML=`<div class="tracked-panel"><h4 class="meta-h4">📋 내 추적 목록 (${items.length})</h4>
    ${items.map(it=>{const volTxt=it.totalVolume>0?`검색량 ${it.totalVolume.toLocaleString()}회 · `:'';
      return `<div class="tracked-row">
      <div><div class="tracked-name">${esc(it.productName)}</div>
        <div class="tracked-meta">${volTxt}난이도 ${it.difficulty} · ${new Date(it.createdAt).toLocaleDateString('ko-KR')}</div></div>
      <button class="tracked-del" data-id="${it.id}">삭제</button></div>`;}).join('')}</div>`;
  box.querySelectorAll('.tracked-del').forEach(b=>b.onclick=()=>{removeTracking(b.dataset.id);renderTracked();
    const tBtn=document.getElementById('trackBtn');if(tBtn){tBtn.disabled=false;tBtn.classList.remove('done');
      const lbl=document.getElementById('trackLabel');if(lbl)lbl.textContent='📌 이 상품명으로 순위추적 등록하기';}});
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

renderTracked();
detectMode().then(generate);
</script>
